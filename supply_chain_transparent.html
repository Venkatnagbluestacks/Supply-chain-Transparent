<!DOCTYPE html>

<html lang="en" style="background:transparent;">
<head>
<style>html,body{background:transparent!important;}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Supply Chain</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Exo+2:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:transparent;
min-height:auto;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:‘Exo 2’,sans-serif;
overflow:hidden;
}

/* starfield removed */

/* ───── SCENE ───── */
.scene{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
z-index:1;
}

/* ───── STATUS BAR ───── */
.status-bar{
font-family:‘Orbitron’,monospace;
font-size:9px;
font-weight:600;
letter-spacing:.18em;
text-transform:uppercase;
color:rgba(0,0,0,.45);
padding:0 0 14px;
text-align:center;
}
#statusText{color:#222;text-shadow:none;transition:color .3s;}

/* ───── TRAVELLING PACKAGE ───── */
#pkg{
position:absolute;
font-size:16px;
top:0;left:0;
z-index:200;
pointer-events:none;
filter:drop-shadow(0 0 12px rgba(255,220,80,1));
transform:translate(-50%,-50%);
opacity:0;
}

/* ───── CHAIN ROW ───── */
.chain-wrapper{
display:flex;
align-items:center;
justify-content:center;
padding:10px 10px 16px;
gap:0;
flex-wrap:nowrap;
}

/* ───── STEP ───── */
.step{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
width:60px;
flex-shrink:0;
animation:stepIn .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes stepIn{from{opacity:0;transform:translateY(24px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}

/* stagger */
.step:nth-child(1) {animation-delay:.05s}
.step:nth-child(3) {animation-delay:.13s}
.step:nth-child(5) {animation-delay:.21s}
.step:nth-child(7) {animation-delay:.29s}
.step:nth-child(9) {animation-delay:.37s}
.step:nth-child(11){animation-delay:.45s}
.step:nth-child(13){animation-delay:.53s}
.step:nth-child(15){animation-delay:.61s}
.step:nth-child(17){animation-delay:.69s}

/* ───── ICON CARD ───── */
.card{
width:50px;height:50px;
border-radius:12px;
position:relative;
display:flex;align-items:center;justify-content:center;
overflow:visible;
cursor:pointer;
transition:transform .18s ease;
}
.card.hit{transform:scale(1.18) translateY(-4px)!important;}

/* 3D tilt on hover */
.card:hover{transform:rotateX(8deg) rotateY(-8deg) scale(1.08);}

/* the SVG sits on top */
.card svg{position:relative;z-index:2;width:34px;height:34px;}

.step-num{
font-family:‘Orbitron’,monospace;
font-size:6px;font-weight:600;
letter-spacing:.2em;
color:rgba(0,0,0,.3);
text-transform:uppercase;
}
.step-label{
font-family:‘Orbitron’,monospace;
font-weight:600;font-size:6px;
letter-spacing:.06em;
text-align:center;
text-transform:uppercase;
line-height:1.4;
color:var(--label-col);
text-shadow:none;
}

/* ───── STEP COLOUR THEMES ───── */
.s1 
.s1{--label-col:#1D4ED8;}

.s2 
.s2{--label-col:#B45309;}

.s3 
.s3{--label-col:#15803D;}

.s4 
.s4{--label-col:#7C3AED;}

.s5 
.s5{--label-col:#EA580C;}

.s6 
.s6{--label-col:#0891B2;}

.s7 
.s7{--label-col:#D97706;}

.s8 
.s8{--label-col:#0D9488;}

.s9 
.s9{--label-col:#E11D48;}

/* pulse glows */
.s1 
.s4 
.s6 
.s8 
.s9 
50%{box-shadow:0 4px 18px rgba(59,130,246,.4)}}
50%{box-shadow:0 4px 18px rgba(124,58,237,.4)}}
50%{box-shadow:0 4px 18px rgba(8,145,178,.4)}}
50%{box-shadow:0 4px 18px rgba(13,148,136,.4)}}
50%{box-shadow:0 4px 18px rgba(225,29,72,.4)}}

/* ───── CONNECTOR ───── */
.connector{
width:20px;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
margin-top:-18px;
animation:connIn .4s ease both;
}
@keyframes connIn{from{opacity:0}to{opacity:1}}
.connector svg{width:20px;height:10px;overflow:visible;}
.aline{stroke-dasharray:4 3;animation:dashFlow 1s linear infinite;}
@keyframes dashFlow{to{stroke-dashoffset:-28}}

/* particle dots */
.pt{r:2;animation:ptTravel 1.3s linear infinite;}
.pt:nth-child(2){animation-delay:-.43s}
.pt:nth-child(3){animation-delay:-.86s}
@keyframes ptTravel{0%{cx:2;opacity:0}10%{opacity:1}90%{opacity:1}100%{cx:30;opacity:0}}

/* ───── 3-D SVG ANIMATION HELPERS ───── */

/* Warehouse: shimmer on windows */
.wh-window{animation:whShimmer 2.5s ease-in-out infinite;}
@keyframes whShimmer{0%,100%{opacity:.3}50%{opacity:.85}}

/* Truck: body rock */
.truck-3d{animation:truckRock 1.8s ease-in-out infinite;transform-origin:50% 80%;}
@keyframes truckRock{0%,100%{transform:translateX(0) rotate(0deg)}40%{transform:translateX(3px) rotate(.6deg)}70%{transform:translateX(-1px) rotate(-.3deg)}}
.wheel3d{animation:wheelSpin .7s linear infinite;transform-origin:center;}
@keyframes wheelSpin{to{transform:rotate(360deg)}}

/* Lab: door open/close */
.lab-door{animation:labDoor 3s ease-in-out infinite;transform-origin:10% 50%;}
@keyframes labDoor{0%,40%,100%{transform:scaleX(1)}50%,85%{transform:scaleX(.1)}}

/* Worker: arm swing */
.wk-arm{animation:wkArm 1.1s ease-in-out infinite;transform-origin:48% 35%;}
@keyframes wkArm{0%,100%{transform:rotate(0deg)}45%{transform:rotate(22deg)}}

/* Gears: spin */
.gear3d-a{animation:gearA 2.5s linear infinite;transform-origin:center;}
.gear3d-b{animation:gearA 2.5s linear infinite reverse;transform-origin:center;}
@keyframes gearA{to{transform:rotate(360deg)}}

/* Box lid open/close */
.box3d-lid{animation:boxLid 2s ease-in-out infinite;transform-origin:50% 100%;}
@keyframes boxLid{0%,100%{transform:rotateX(0deg)}40%,60%{transform:rotateX(-40deg)}}

/* Logistics truck: bounce */
.log3d{animation:logBounce 1.4s ease-in-out infinite;}
@keyframes logBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Plane: float */
.plane3d{animation:planeFloat 2.2s ease-in-out infinite;}
@keyframes planeFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(2deg)}}

/* Customer: jump */
.cust3d{animation:custJump 2s ease-in-out infinite;}
@keyframes custJump{0%,100%{transform:translateY(0)}45%{transform:translateY(-6px)}}
.check3d{animation:checkPop 2s ease-in-out infinite;transform-origin:center;}
@keyframes checkPop{0%,50%,100%{transform:scale(1)}70%{transform:scale(1.35)}}

</style>
</head>

<script>
  const pkg       = document.getElementById('pkg');
  const statusEl  = document.getElementById('statusText');
  const scene     = document.querySelector('.scene');
  const boxes     = Array.from({length:8}, (_,i) => document.getElementById('box'+i));
  const steps     = document.querySelectorAll('.step[data-label]');
  const labels    = Array.from(steps).map(s => s.dataset.label);

  const PAUSE_MS  = 720;
  const TRAVEL_MS = 920;

  function getCenter(el) {
    const r  = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    return { x: r.left + r.width/2 - sr.left, y: r.top + r.height/2 - sr.top };
  }

  function travel(fx, fy, tx, ty, ms) {
    return new Promise(resolve => {
      const arcY = Math.min(fy,ty) - 30;
      const mx   = (fx+tx)/2;
      const t0   = performance.now();
      function frame(now) {
        const t = Math.min((now-t0)/ms, 1);
        const u = 1-t;
        const x = u*u*fx + 2*u*t*mx + t*t*tx;
        const y = u*u*fy + 2*u*t*arcY + t*t*ty;
        const rot   = (t-.5)*22;
        const scale = 1 + .18*Math.sin(t*Math.PI);
        pkg.style.left      = x+'px';
        pkg.style.top       = y+'px';
        pkg.style.transform = `translate(-50%,-50%) rotate(${rot}deg) scale(${scale})`;
        t<1 ? requestAnimationFrame(frame) : resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function arrive(el, label, ms) {
    return new Promise(resolve => {
      el.classList.add('hit');
      statusEl.textContent = label;
      const c  = getCenter(el);
      const t0 = performance.now();
      function frame(now) {
        const t  = Math.min((now-t0)/ms, 1);
        const dy = -14*Math.sin(t*Math.PI);
        const sc = 1 + .12*Math.sin(t*Math.PI);
        pkg.style.top       = (c.y+dy)+'px';
        pkg.style.transform = `translate(-50%,-50%) rotate(0deg) scale(${sc})`;
        if(t<1) requestAnimationFrame(frame);
        else { el.classList.remove('hit'); resolve(); }
      }
      requestAnimationFrame(frame);
    });
  }

  async function loop() {
    while(true) {
      const c0 = getCenter(boxes[0]);
      pkg.style.transition='';
      pkg.style.left=c0.x+'px'; pkg.style.top=c0.y+'px';
      pkg.style.transform='translate(-50%,-50%)';
      pkg.style.opacity='1';

      for(let i=0;i<8;i++){
        const c = getCenter(boxes[i]);
        if(i>0){
          const p = getCenter(boxes[i-1]);
          await travel(p.x,p.y,c.x,c.y,TRAVEL_MS);
        }
        pkg.style.left=c.x+'px'; pkg.style.top=c.y+'px';
        await arrive(boxes[i], labels[i], PAUSE_MS);
      }

      statusEl.textContent='New shipment starting…';
      pkg.style.transition='opacity .35s';
      pkg.style.opacity='0';
      await new Promise(r=>setTimeout(r,600));
      pkg.style.transition='';
    }
  }

  window.addEventListener('load', ()=>setTimeout(loop, 950));
</script>
